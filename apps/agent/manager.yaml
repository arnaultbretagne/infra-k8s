# The manager (agent-runtime ADR 0010 / infra-k8s ADR 0028 §3): trusted control plane, the hub's
# single endpoint for both substrates. Holds the ONLY ServiceAccount token in this namespace
# (documented ADR 0024 exception), scoped by infrastructure/configs/agent-runs/rbac.yaml to pod
# CRUD in agent-runs and nothing else.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runtime-manager
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runtime-anchors
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-manager
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO anchors PVC
  selector:
    matchLabels:
      app: runtime-manager
  template:
    metadata:
      labels:
        app: runtime-manager
    spec:
      serviceAccountName: runtime-manager
      automountServiceAccountToken: true # the SOLE exception in this namespace (ADR 0024 §3)
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/arnaultbretagne/agent-runtime@sha256:3860f14612222577ac183c20ef10fac0f6f69500745119ca64c46b0a11652b19
          command: ["node", "dist/manager.js"]
          ports:
            - containerPort: 8080
          env:
            - { name: PORT, value: "8080" }
            - { name: SHARED_SUPERVISOR_URL, value: http://agent:8080 }
            - { name: AGENT_RUNS_NS, value: agent-runs }
            - { name: LOGE_IMAGE, value: "ghcr.io/arnaultbretagne/loge@sha256:57412c49d9ca86f8f3882b0b3e57751555a75e9eb462da91791e2352b5b796d0" }
            # Loge token dispossession (agent-runtime feat/loge-inference-auth-proxy): the manager runs a
            # singleton inference-proxy pod that holds the real token; loges get a placeholder + base-URL.
            - { name: PROXY_PORT, value: "8788" }
            - { name: ANTHROPIC_ACCOUNT_UUID, value: "f9255ae9-488d-40f8-bca8-0ca636702652" }
            # Broker migration canary (P3): false = the proven inference-proxy path (unchanged). Flip to
            # "true" to route NEW loges through the broker; rollback = flip back. BROKER_*_URL default in code.
            - { name: USE_BROKER, value: "true" }
            # P4 (agora ADR 0012): this manager accepts `equipmentProfile`/`target` on a spawn, is the
            # final authority on both, and treats equipment as part of a loge's identity — a run asking
            # for different equipment gets a replaced loge, never the old lease. Deployed BEFORE the
            # agora that sends the fields (a hub that sends none still lands on chat-v1). `chat-v1`
            # stays the only ENABLED profile: the catalogue gates vault/repo in code until P5/P6.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
          volumeMounts:
            - { name: anchors, mountPath: /anchors }
      volumes:
        - name: anchors
          persistentVolumeClaim:
            claimName: runtime-anchors
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-manager
spec:
  selector:
    app: runtime-manager
  ports:
    - { port: 8080, targetPort: 8080 }
