# The manager (agent-runtime ADR 0010 / infra-k8s ADR 0028 §3): trusted control plane, the hub's
# single endpoint for both substrates. Holds the ONLY ServiceAccount token in this namespace
# (documented ADR 0024 exception), scoped by infrastructure/configs/agent-runs/rbac.yaml to pod
# CRUD in agent-runs and nothing else.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runtime-manager
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runtime-anchors
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-manager
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO anchors PVC
  selector:
    matchLabels:
      app: runtime-manager
  template:
    metadata:
      labels:
        app: runtime-manager
    spec:
      serviceAccountName: runtime-manager
      automountServiceAccountToken: true # the SOLE exception in this namespace (ADR 0024 §3)
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/arnaultbretagne/agent-runtime@sha256:20423fde62d4547dbaf3ca4ad897b36630c838111ca843e6888b0bde02bf47de
          command: ["node", "dist/manager.js"]
          ports:
            - containerPort: 8080
          env:
            - { name: PORT, value: "8080" }
            - { name: SHARED_SUPERVISOR_URL, value: http://agent:8080 }
            - { name: AGENT_RUNS_NS, value: agent-runs }
            - { name: LOGE_IMAGE, value: "ghcr.io/arnaultbretagne/loge@sha256:efab1a4f22656cd2e5b3b36cf9dc5f1ff40399b57be7b3dc4640789155800861" }
            # Loge token dispossession (agent-runtime feat/loge-inference-auth-proxy): the manager runs a
            # singleton inference-proxy pod that holds the real token; loges get a placeholder + base-URL.
            - { name: PROXY_PORT, value: "8788" }
            - { name: ANTHROPIC_ACCOUNT_UUID, value: "f9255ae9-488d-40f8-bca8-0ca636702652" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
          volumeMounts:
            - { name: anchors, mountPath: /anchors }
      volumes:
        - name: anchors
          persistentVolumeClaim:
            claimName: runtime-anchors
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-manager
spec:
  selector:
    app: runtime-manager
  ports:
    - { port: 8080, targetPort: 8080 }
