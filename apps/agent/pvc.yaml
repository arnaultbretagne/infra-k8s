# The hub's neutral conversation store — the SOLE source of truth (agora ADR 0005).
# NOT the runtime PVC: the history must not depend on a runtime's disk.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agora-data
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
