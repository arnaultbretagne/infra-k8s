# agent.bretagne.dev → oauth2-proxy (the OIDC gate). Same listener/cert as the rest
# (multi-SAN bretagne-tls). Everything behind the gate; no unauthenticated path in.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent
spec:
  parentRefs:
    - name: bretagne-gateway
      namespace: traefik
      sectionName: https-agent
  hostnames:
    - agent.bretagne.dev
  rules:
    - filters:
        # HSTS (S8). Conservative 1-day max-age for the initial rollout — reversible if a
        # cert breaks; raise to 31536000 (1y) after a validation window. No preload.
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: "max-age=86400; includeSubDomains"
      backendRefs:
        - name: oauth2-proxy
          port: 4180
