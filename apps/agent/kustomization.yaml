apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agent
resources:
  - namespace.yaml
  - secrets.yaml          # oauth2-proxy (SOPS). claude-creds is created out-of-band (see README-note below)
  - claude-oauth.secrets.yaml   # static setup-token OAuth token (SOPS) — runtime auth, agent-runtime ADR 0007
  - vault-broker.secrets.yaml   # Pocket-ID machine client_secret for the broker's vault adapter (SOPS, P5)
  - pvc.yaml              # agora-data (the website PVC). agent-claude (the retired shared substrate) was removed 2026-07-06.
  - cnpg.yaml
  - restore-test.yaml
  - manager.yaml          # runtime-manager (agent-runtime ADR 0010 / infra-k8s ADR 0028): the hub's single endpoint. All runs are isolated loges now — the shared agent-runtime pod is retired.
  - website.yaml
  - oauth2-proxy.yaml
  - httproute.yaml
  - networkpolicy.yaml
  - broker.yaml            # the agent credential broker — dark (agent-runtime ADR 0011; broker plan P2)
  - broker-pvc.yaml        # the lease store (RWO)
  - broker-networkpolicy.yaml
# NOTE: auth is now a static `setup-token` (CLAUDE_CODE_OAUTH_TOKEN, SOPS above) — agent-runtime
# ADR 0007. The old rotating `claude-creds` Secret + the seed initContainer's creds-copy are gone
# (removed 2026-07-02); the runtime never logs in itself, it only carries the static token.
