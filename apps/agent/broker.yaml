# The agent credential broker (agent-runtime ADR 0011), deployed DARK (broker plan P2): a policy
# front + three isolated provider adapters, no production secrets, no real consumer yet. All run the
# agent-runtime image with a per-role entrypoint (like manager / inference-proxy). The front holds the
# lease store (RWO PVC, single replica, plan §2.7); the adapters will each hold ONE provider secret
# (P3/P5/P6). None reaches the Kubernetes API (automountServiceAccountToken: false).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-broker
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO PVC (the lease store)
  selector:
    matchLabels: { app: agent-broker }
  template:
    metadata:
      labels: { app: agent-broker }
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: front
          image: ghcr.io/arnaultbretagne/agent-runtime@sha256:3a89bf5bcf885fa447c0c1731d608c72368ff084c695bed6295e7e33d0f4d5b9
          args: ["node", "dist/broker/front.js"]
          ports:
            - { name: data, containerPort: 8788 } # loge-facing
            - { name: admin, containerPort: 8789 } # manager-only
          env:
            - { name: LEASE_STORE_PATH, value: /var/lib/broker/leases.json }
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 15m, memory: 48Mi }
            limits: { memory: 128Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: 8789 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8789 }
            periodSeconds: 30
          volumeMounts:
            - { name: leases, mountPath: /var/lib/broker }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: leases
          persistentVolumeClaim: { claimName: agent-broker-leases }
        - name: tmp
          emptyDir: { sizeLimit: 16Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: agent-broker
spec:
  selector: { app: agent-broker }
  ports:
    - { name: data, port: 8788, targetPort: 8788 }
    - { name: admin, port: 8789, targetPort: 8789 }
---
# ---- adapters: one Deployment + Service each, one secret each (P3/P5/P6). P2 = stub (501). ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-broker-claude
spec:
  replicas: 1
  selector:
    matchLabels: { app: agent-broker-claude }
  template:
    metadata:
      labels: { app: agent-broker-claude }
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: adapter
          image: ghcr.io/arnaultbretagne/agent-runtime@sha256:3c996e46e819496a7b8bf40c3a5b2ed49da9b34639e22125e94fbe6272813fa8
          args: ["node", "dist/broker/adapter-claude.js"]
          ports: [{ name: adapter, containerPort: 8790 }]
          env:
            # P3: the claude adapter holds the REAL token — custody moves here (trusted ns) from the
            # agent-runs inference-proxy; the loge only ever holds an opaque lease.
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom: { secretKeyRef: { name: claude-oauth-token, key: token } }
            - { name: ANTHROPIC_ACCOUNT_UUID, value: "f9255ae9-488d-40f8-bca8-0ca636702652" }
            - { name: UPSTREAM_ORIGIN, value: https://api.anthropic.com }
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 10m, memory: 40Mi }
            limits: { memory: 96Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8790 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8790 }
            periodSeconds: 30
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: { sizeLimit: 16Mi } }]
---
apiVersion: v1
kind: Service
metadata:
  name: agent-broker-claude
spec:
  selector: { app: agent-broker-claude }
  ports: [{ name: adapter, port: 8790, targetPort: 8790 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-broker-vault
spec:
  replicas: 1
  selector:
    matchLabels: { app: agent-broker-vault }
  template:
    metadata:
      labels: { app: agent-broker-vault }
    spec:
      automountServiceAccountToken: false
      securityContext:
        # fsGroup so the mounted client-secret is group-readable by the adapter's uid 1000. A Secret
        # volume lands owned root:fsGroup, so without this the file is root-only and 0400 locks the
        # adapter out of its own credential (hit live 2026-07-15: EACCES -> honest 503).
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: adapter
          image: ghcr.io/arnaultbretagne/agent-runtime@sha256:8f9c7cd2197bda01826de6260a416bd631b83f4188595f8cdb8a06adc17d2058
          args: ["node", "dist/broker/adapter-vault.js"]
          ports: [{ name: adapter, containerPort: 8790 }]
          env:
            # P5.3, deployed DARK. Everything here is public config; the two secret-adjacent pieces —
            # POCKET_ID_CLIENT_ID and the client secret — are absent until the machine client exists
            # (Arnault's IAM checkpoint, plan P5.2 step 3). Missing config => the adapter serves an
            # honest 503 rather than crash-looping, exactly as the claude adapter did before P3.
            # The machine client created by the oidc-reconciler (spec.json: agent_broker_vault).
            # Its UUID is public and MUST match what MCP_ALLOWED_CLIENT_IDS lists on the vault MCP —
            # the token carries it as `sub = client-<uuid>`, which is the only unforgeable identity
            # Pocket-ID asserts. Recreating the client changes this UUID and breaks both ends.
            - { name: POCKET_ID_CLIENT_ID, value: "285e5889-e9b4-40cf-b1e8-a6f430f42c35" }
            # Read from a FILE, never an env var: `kubectl exec ... env` and a crashed process's
            # environ both miss a mounted file, and it rotates without touching this pod spec.
            - { name: POCKET_ID_CLIENT_SECRET_FILE, value: /etc/broker/client-secret }
            - { name: POCKET_ID_TOKEN_ENDPOINT, value: https://id.bretagne.dev/api/oidc/token }
            # RFC 8707 resource -> becomes the token's `aud`, which is what the vault MCP gates on.
            # It must stay the resource IDENTIFIER the MCP server advertises, not the URL we dial.
            - { name: VAULT_RESOURCE, value: https://vault.bretagne.dev }
            # ...and the URL we actually dial is in-cluster: no hairpin out through traefik for a call
            # that never has to leave the cluster.
            - { name: VAULT_MCP_URL, value: http://obsidian-mcp.obsidian.svc.cluster.local:4000/mcp }
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 10m, memory: 40Mi }
            limits: { memory: 96Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8790 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8790 }
            periodSeconds: 30
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: client-secret, mountPath: /etc/broker, readOnly: true }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 16Mi }
        - name: client-secret
          secret: { secretName: pocket-id-broker-client, defaultMode: 0440 }
---
apiVersion: v1
kind: Service
metadata:
  name: agent-broker-vault
spec:
  selector: { app: agent-broker-vault }
  ports: [{ name: adapter, port: 8790, targetPort: 8790 }]
---
