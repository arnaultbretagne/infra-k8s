# The agent-runtime pod (agent-runtime ADR 0001/0004): the thin supervisor + the
# Claude runtime(s) it spawns, and the agora channel each spawned claude loads.
# "Libre dedans, borné dehors" — the CiliumNetworkPolicy bounds it (networkpolicy.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO PVC (~/.claude): never two pods on the same volume
  selector:
    matchLabels:
      app: agent-runtime
  template:
    metadata:
      labels:
        app: agent-runtime
    spec:
      # this pod never talks to the Kubernetes API — don't hand it a token (audit F-02,
      # agent-runtime ADR 0003: isolation by absence of an API token)
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true    # image is USER node (uid 1000); declare it so PSS restricted admits it (F-01)
        runAsUser: 1000
        fsGroup: 1000         # so uid-1000 (node) can write the local-path PVC + emptyDir
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # 1. stage the channel plugin (from the agora product image) into a shared dir
        - name: fetch-channel
          # pinned to the live digest — immutable, so Git == what runs (audit F-04).
          # NOTE: this is a DIFFERENT agora-website build than website.yaml runs (both were
          # ":latest" and drifted apart live); reconcile to one digest on the next release.
          image: ghcr.io/arnaultbretagne/agora-website:latest@sha256:94b80be1c993732c58a734e6d9be3a4ef1b3ed0989f4702d5fc55b392a38a493
          # -r, not -a: the emptyDir is non-root-owned, so preserving attrs (-a) EPERMs
          command: ["sh", "-c", "cp -r /opt/agora/. /channel-src/"]
          volumeMounts:
            - { name: channel-src, mountPath: /channel-src }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
        # 2. seed the PVC once: install the channel plugin (if absent). Creds are NOT seeded here
        #    anymore — auth is a static setup-token via env CLAUDE_CODE_OAUTH_TOKEN (ADR 0007).
        - name: seed
          image: ghcr.io/arnaultbretagne/agent-runtime:latest@sha256:453ec5005d5ccfeeabfb4d3883bc038b8b34281ca697c478a306822518e9d9c7
          command:
            - sh
            - -c
            - |
              set -e
              if [ ! -d "$HOME/.claude/plugins/cache/agora" ]; then
                echo "installing agora channel plugin"
                claude plugin marketplace add /channel-src
                claude plugin install agora@agora
              else
                echo "agora plugin already installed — keeping"
              fi
          env:
            - { name: HOME, value: /home/node }
          volumeMounts:
            - { name: claude, mountPath: /home/node/.claude }
            - { name: channel-src, mountPath: /channel-src }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
      containers:
        - name: supervisor
          # pinned to the live digest (audit F-04) — same build as the seed initContainer
          image: ghcr.io/arnaultbretagne/agent-runtime:latest@sha256:453ec5005d5ccfeeabfb4d3883bc038b8b34281ca697c478a306822518e9d9c7
          ports:
            - containerPort: 8080
          env:
            - { name: PORT, value: "8080" }
            - { name: HOST, value: "0.0.0.0" }
            - { name: RUNTIME_CWD, value: /home/node/work }
            - { name: PTY_LOG_DIR, value: /logs }   # observability: per-session PTY drain
            # Static long-lived OAuth token (`claude setup-token`) — does NOT rotate, so N concurrent
            # runtimes never race on refresh and a copied credential never self-invalidates. Supersedes
            # the rotating-creds / PVC-refresh design of agent-runtime ADR 0006 (see agent-runtime ADR 0007).
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef: { name: claude-oauth-token, key: token }
            # Freeze claude at the image-pinned version: kill the runtime auto-updater (observed
            # jumping 2.1.197→2.1.198 mid-session). Version behaviour (auth/transcript/resume) must
            # change only on a deliberate image rebuild — agent-runtime ADR 0007 / agora ADR 0007.
            - { name: DISABLE_AUTOUPDATER, value: "1" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 2Gi }          # the supervisor + its claude children live here
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
          volumeMounts:
            - { name: claude, mountPath: /home/node/.claude }
            # the channel marketplace was `directory`-added at /channel-src during seed;
            # keep that path valid at runtime (claude re-reads the marketplace on start)
            - { name: channel-src, mountPath: /channel-src, readOnly: true }
            - { name: logs, mountPath: /logs }
      volumes:
        - name: claude
          persistentVolumeClaim:
            claimName: agent-claude
        - name: channel-src
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent                 # the supervisor control-plane service (:8080), in-cluster only
spec:
  selector:
    app: agent-runtime
  ports:
    - { port: 8080, targetPort: 8080 }
