# The OIDC gate (infra-k8s ADR 0021): the ONLY public door to the agent platform.
# Human traffic on agent.bretagne.dev → oauth2-proxy → the hub (website:8600). The
# hub assumes an already-authenticated, single user (agora ADR 0004 / agent-runtime ADR 0005).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      # the OIDC gate never calls the Kubernetes API — no token (audit F-02)
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true    # the quay image already runs as uid 2000; declare it for PSS restricted (F-01)
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args: ["--http-address=0.0.0.0:4180"]
          env:
            - { name: OAUTH2_PROXY_PROVIDER, value: oidc }
            - { name: OAUTH2_PROXY_OIDC_ISSUER_URL, value: https://id.bretagne.dev }
            - { name: OAUTH2_PROXY_REDIRECT_URL, value: https://agent.bretagne.dev/oidc/callback }
            - { name: OAUTH2_PROXY_PROXY_PREFIX, value: /oidc }
            # upstream = the hub (was the supervisor in the MVP; the hub is now the façade)
            - { name: OAUTH2_PROXY_UPSTREAMS, value: http://website.agent.svc.cluster.local:8600 }
            - { name: OAUTH2_PROXY_EMAIL_DOMAINS, value: "*" }
            - { name: OAUTH2_PROXY_COOKIE_SECURE, value: "true" }
            - { name: OAUTH2_PROXY_COOKIE_DOMAINS, value: agent.bretagne.dev }
            - { name: OAUTH2_PROXY_WHITELIST_DOMAINS, value: agent.bretagne.dev }
            - { name: OAUTH2_PROXY_REVERSE_PROXY, value: "true" }
            - { name: OAUTH2_PROXY_SKIP_PROVIDER_BUTTON, value: "true" }
            # Pocket-ID does not verify email → accept unverified (infra-k8s ADR 0021)
            - { name: OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL, value: "true" }
          envFrom:
            - secretRef:
                name: oauth2-proxy      # OAUTH2_PROXY_CLIENT_ID/_SECRET/_COOKIE_SECRET
          ports:
            - containerPort: 4180
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
spec:
  selector:
    app: oauth2-proxy
  ports:
    - { port: 4180, targetPort: 4180 }
