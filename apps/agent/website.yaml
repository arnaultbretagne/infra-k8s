# The agora website (the hub, agora ADR 0004): the human façade + the pipe endpoint.
# Owns the neutral conversation store (agora-data PVC, ADR 0005). Talks to the
# supervisor (control plane) and receives the channels' WS (data plane).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO PVC (/data = the sole-source-of-truth history)
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: website
          image: ghcr.io/arnaultbretagne/agora-website@sha256:4233b35b30965393350c663f59eb021979a3a39b06e87131b186e1caf5ae1a1a
          ports:
            - containerPort: 8600
            - containerPort: 8601   # channel plane — loge-facing WS only (agora ADR 0002 amendment; broker plan P1)
          env:
            - { name: PORT, value: "8600" }
            - { name: CHANNEL_PORT, value: "8601" }   # loge-facing channel WS listener (broker plan P1)
            - { name: HOST, value: "0.0.0.0" }
            - { name: DATA_DIR, value: /data }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: agora-pg-app, key: uri }
            # points at the manager now (agent-runtime ADR 0010) — a strict superset of the
            # supervisor API, so this client code needed no change. Rollback = revert this line.
            - { name: SUPERVISOR_URL, value: http://runtime-manager.agent.svc.cluster.local:8080 }
            # Execution-substrate platform policy (agora ADR 0011, revised 2026-07-06): resolved
            # per spawn in the hub, never a per-conversation attribute. `isolated` = every run
            # gets its own gVisor loge in agent-runs; the shared substrate is being retired.
            # Rollback = set back to shared (or remove this line — the code default is shared).
            - { name: AGORA_SUBSTRATE_DEFAULT, value: isolated }
            # what spawned channels (in the runtime pod) dial back to reach the hub
            - { name: CHANNEL_HUB_URL, value: ws://website.agent.svc.cluster.local:8601/ws/channel }
            # channel logs land in the runtime pod's /logs emptyDir (observability)
            - { name: CHANNEL_LOG_DIR, value: /logs }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { memory: 512Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8600 }
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8600 }
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agora-data
---
apiVersion: v1
kind: Service
metadata:
  name: website               # the hub façade (:8600) — behind oauth2-proxy, in-cluster
spec:
  selector:
    app: website
  ports:
    - { name: human, port: 8600, targetPort: 8600 }
    - { name: channel, port: 8601, targetPort: 8601 }   # channel plane (broker plan P1)
