# Bounds the agent platform per agent-runtime ADR 0003 ("libre dedans, borné dehors").
# Cilium is default-deny for any endpoint a policy selects, so each pod below is
# locked to exactly the flows it needs.

# --- the runtime pod: free to reach the internet (Anthropic), bounded intra-cluster ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: agent-runtime
  namespace: agent
spec:
  endpointSelector:
    matchLabels:
      app: agent-runtime
  ingress:
    # the manager (agent-runtime ADR 0010) proxies shared spawns here now — the actual caller
    # since website's SUPERVISOR_URL flip (PR-2). Gap found live 2026-07-05: this rule was missed
    # when adding the manager's own CNP, causing every shared spawn to 503 quota_exceeded
    # (fetch() throwing on the Cilium drop, mis-surfaced by the manager's broad catch-all).
    - fromEndpoints: [{ matchLabels: { app: runtime-manager } }]
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
    # the hub (control plane) -> supervisor API :8080 — kept for the pre-manager fallback / direct debugging
    - fromEndpoints: [{ matchLabels: { app: website } }]
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
    # kubelet health probes
    - fromEntities: [host]
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
  egress:
    # DNS (CoreDNS)
    - toEndpoints: [{ matchLabels: { k8s:io.kubernetes.pod.namespace: kube-system, k8s:k8s-app: kube-dns } }]
      toPorts:
        - ports: [{ port: "53", protocol: UDP }, { port: "53", protocol: TCP }]
    # the channel (spawned inside this pod) dials the hub :8600 — the one intra-cluster egress
    - toEndpoints: [{ matchLabels: { app: website } }]
      toPorts: [{ ports: [{ port: "8600", protocol: TCP }] }]
    # internet egress (Anthropic API, ...) — NOT other intra-cluster, NOT kube-apiserver
    - toEntities: [world]
      toPorts:
        - ports: [{ port: "443", protocol: TCP }, { port: "80", protocol: TCP }]
---
# --- the hub: trusted infra, but still tight — no internet, only DNS + supervisor ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: website
  namespace: agent
spec:
  endpointSelector:
    matchLabels:
      app: website
  ingress:
    # the OIDC gate -> hub (human traffic)
    - fromEndpoints: [{ matchLabels: { app: oauth2-proxy } }]
      toPorts: [{ ports: [{ port: "8600", protocol: TCP }] }]
    # the channels (from the runtime pod) -> hub WS
    - fromEndpoints: [{ matchLabels: { app: agent-runtime } }]
      toPorts: [{ ports: [{ port: "8600", protocol: TCP }] }]
    # the channels (from a loge, isolated substrate) -> hub WS, cross-namespace (ADR 0010/0028)
    - fromEndpoints: [{ matchLabels: { k8s:io.kubernetes.pod.namespace: agent-runs, app: loge } }]
      toPorts: [{ ports: [{ port: "8600", protocol: TCP }] }]
    # kubelet health probes
    - fromEntities: [host]
      toPorts: [{ ports: [{ port: "8600", protocol: TCP }] }]
  egress:
    # DNS (CoreDNS)
    - toEndpoints: [{ matchLabels: { k8s:io.kubernetes.pod.namespace: kube-system, k8s:k8s-app: kube-dns } }]
      toPorts:
        - ports: [{ port: "53", protocol: UDP }, { port: "53", protocol: TCP }]
    # the hub drives the supervisor control plane :8080 (only) — direct egress kept during the
    # migration (removed only in the gated P5 follow-up, infra-k8s ADR 0028 §5)
    - toEndpoints: [{ matchLabels: { app: agent-runtime } }]
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
    # the hub's new single endpoint: the manager (ADR 0010) — both substrates route through it
    - toEndpoints: [{ matchLabels: { app: runtime-manager } }]
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
    # the hub's conversation store (agora ADR 0009)
    - toEndpoints: [{ matchLabels: { cnpg.io/cluster: agora-pg } }]
      toPorts: [{ ports: [{ port: "5432", protocol: TCP }] }]
---
# --- the manager: trusted control plane, the hub's single endpoint for both substrates
#     (agent-runtime ADR 0010 / infra-k8s ADR 0028) ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: runtime-manager
  namespace: agent
spec:
  endpointSelector:
    matchLabels:
      app: runtime-manager
  ingress:
    - fromEndpoints: [{ matchLabels: { app: website } }]
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
    - fromEntities: [host] # kubelet health probes
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
  egress:
    - toEndpoints: [{ matchLabels: { k8s:io.kubernetes.pod.namespace: kube-system, k8s:k8s-app: kube-dns } }]
      toPorts:
        - ports: [{ port: "53", protocol: UDP }, { port: "53", protocol: TCP }]
    - toEntities: [kube-apiserver] # pod CRUD in agent-runs (rbac.yaml scopes what it can actually do)
      toPorts: [{ ports: [{ port: "6443", protocol: TCP }] }]
    - toEndpoints: [{ matchLabels: { app: agent-runtime } }] # shared-substrate proxy target
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
    - toEndpoints: [{ matchLabels: { k8s:io.kubernetes.pod.namespace: agent-runs, app: loge } }]
      toPorts: [{ ports: [{ port: "8080", protocol: TCP }] }]
---
# --- agora-pg: the hub's conversation store (agora ADR 0009) — cloned from pocket-id-pg ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: agora-pg
  namespace: agent
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: agora-pg
  ingress:
    # app -> postgres
    - fromEndpoints:
        - matchLabels:
            app: website
      toPorts:
        - ports: [{ port: "5432", protocol: TCP }]
    # CNPG operator -> instance (status :8000 + SQL :5432 for management)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
            k8s:app.kubernetes.io/name: cloudnative-pg
      toPorts:
        - ports:
            - { port: "8000", protocol: TCP }
            - { port: "5432", protocol: TCP }
    # intra-cluster (replication / future HA) — same CNPG cluster
    - fromEndpoints:
        - matchLabels:
            cnpg.io/cluster: agora-pg
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
            - { port: "8000", protocol: TCP }
    # kubelet probes -> status :8000
    - fromEntities: [host]
      toPorts:
        - ports: [{ port: "8000", protocol: TCP }]
    # Prometheus (observability) -> CNPG metrics :9187 (PodMonitor)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports: [{ port: "9187", protocol: TCP }]
  egress:
    # instance manager -> kube-apiserver
    - toEntities: [kube-apiserver]
      toPorts:
        - ports: [{ port: "6443", protocol: TCP }]
    # -> DNS (CoreDNS)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    # barman backups -> S3 / Cloudflare R2 (external HTTPS). Tighten to toFQDNs later.
    - toEntities: [world]
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
    # intra-cluster (replication / future HA)
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: agora-pg
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
            - { port: "8000", protocol: TCP }
