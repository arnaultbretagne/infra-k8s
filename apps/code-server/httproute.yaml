apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: code-server
spec:
  parentRefs:
    - name: bretagne-gateway
      namespace: traefik
      sectionName: https-code
  hostnames:
    - code.bretagne.dev
  rules:
    - backendRefs:
        - name: oauth2-proxy
          port: 4180
