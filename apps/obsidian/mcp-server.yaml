# The MCP server exposing the vault at vault.bretagne.dev. It is its own OAuth
# resource server (JWT/JWKS validation against Pocket-ID) — no oauth2-proxy in
# front: MCP clients do the OAuth flow themselves (ADR 0021 gates apps with no
# usable auth; this one has real auth).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian-mcp
  template:
    metadata:
      labels:
        app: obsidian-mcp
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
      containers:
        - name: mcp-server
          image: ghcr.io/arnaultbretagne/obsidian-mcp:0.4.0
          ports:
            - containerPort: 4000
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: VAULT_PATH
              value: /vault
            - name: MCP_PORT
              value: "4000"
            - name: MCP_SERVER_URL
              value: https://vault.bretagne.dev
            - name: POCKET_ID_ISSUER
              value: https://id.bretagne.dev
            # F-05 makes `aud` mandatory (defaults to MCP_SERVER_URL). Pocket-ID binds the RFC 8707
            # resource->aud ONLY for the client_credentials grant; the Claude.ai / ChatGPT connectors
            # use authorization_code, where Pocket-ID ignores `resource` and sets aud = <client_id> —
            # so their client_ids must be accepted explicitly, else the connectors 401 (why they broke;
            # obsidian-stack ADR 0002, Update 2026-07-08). NB: these are Pocket-ID-generated client_ids —
            # if a connector is recreated in apps/pocket-id/oidc-reconciler/spec.json its UUID changes,
            # update here. (claude_auth, openai_auth.)
            - name: MCP_ALLOWED_AUDIENCE
              value: "https://vault.bretagne.dev,a8bcf978-4c56-4cbd-bedc-e369777a6713,7db41a0c-cc74-433a-a11b-0b3cc1fe289c"
            # v0.4.0 (agent-broker plan P5.2 step 1): this image KNOWS how to enforce
            # MCP_ALLOWED_CLIENT_IDS, but the variable stays ABSENT — absent is the documented way to
            # leave the gate off. Do NOT set it to "" to disable it: v0.4.0 refuses to start on a gate
            # variable that is present but blank, precisely so a gate can never read as configured
            # while enforcing nothing (obsidian-stack ADR 0002, Update 2026-07-15).
            # Turning the gate on is Arnault's checkpoint (plan P5.2 step 6) and needs the broker's
            # dedicated Pocket-ID machine client to exist first: MCP_ALLOWED_CLIENT_IDS would then list
            # that client's UUID (matched via its `sub = client-<uuid>`), and the connectors keep
            # passing on `aud` since authorization_code tokens present no client id at all.
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /vault
              subPath: vault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: obsidian-data
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian-mcp
spec:
  selector:
    app: obsidian-mcp
  ports:
    - port: 4000
      targetPort: 4000
