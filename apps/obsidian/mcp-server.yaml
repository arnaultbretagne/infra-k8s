# The MCP server exposing the vault at vault.bretagne.dev. It is its own OAuth
# resource server (JWT/JWKS validation against Pocket-ID) — no oauth2-proxy in
# front: MCP clients do the OAuth flow themselves (ADR 0021 gates apps with no
# usable auth; this one has real auth).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian-mcp
  template:
    metadata:
      labels:
        app: obsidian-mcp
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
      containers:
        - name: mcp-server
          image: ghcr.io/arnaultbretagne/obsidian-mcp:0.2.0
          ports:
            - containerPort: 4000
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: VAULT_PATH
              value: /vault
            - name: MCP_PORT
              value: "4000"
            - name: MCP_SERVER_URL
              value: https://vault.bretagne.dev
            - name: POCKET_ID_ISSUER
              value: https://id.bretagne.dev
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /vault
              subPath: vault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: obsidian-data
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian-mcp
spec:
  selector:
    app: obsidian-mcp
  ports:
    - port: 4000
      targetPort: 4000
