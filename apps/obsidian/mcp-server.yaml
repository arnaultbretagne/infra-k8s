# The MCP server exposing the vault at vault.bretagne.dev. It is its own OAuth
# resource server (JWT/JWKS validation against Pocket-ID) — no oauth2-proxy in
# front: MCP clients do the OAuth flow themselves (ADR 0021 gates apps with no
# usable auth; this one has real auth).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian-mcp
  template:
    metadata:
      labels:
        app: obsidian-mcp
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
      containers:
        - name: mcp-server
          # Token audience/authz enforcement (audit F-05) ships in >= 0.3.0. Bump this
          # tag to the built image (CI publishes obsidian-mcp:<semver> on a v* tag) to
          # activate it; the MCP_ALLOWED_AUDIENCE env below is inert on 0.2.0.
          image: ghcr.io/arnaultbretagne/obsidian-mcp:0.2.0
          ports:
            - containerPort: 4000
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: VAULT_PATH
              value: /vault
            - name: MCP_PORT
              value: "4000"
            - name: MCP_SERVER_URL
              value: https://vault.bretagne.dev
            - name: POCKET_ID_ISSUER
              value: https://id.bretagne.dev
            # Bind the token to THIS resource, not just the issuer (audit F-05): a JWT
            # Pocket-ID minted for another client/resource must not be accepted by a
            # server that reads/writes the vault. This is the RFC 8707 `resource` value
            # the server advertises in its protected-resource metadata (ADR 0002).
            - name: MCP_ALLOWED_AUDIENCE
              value: https://vault.bretagne.dev
            # Optional extra gates — enable once verified against a real Pocket-ID token
            # (left unset to avoid locking out a claim the IdP may not emit):
            #   MCP_ALLOWED_CLIENT_IDS: "<mcp-client-id>"  # the manually-registered client (ADR 0002)
            #   MCP_REQUIRED_GROUPS:    "admin"            # match the other apps' allowedGroups
            #   MCP_REQUIRED_SCOPES:    "openid"
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /vault
              subPath: vault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: obsidian-data
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian-mcp
spec:
  selector:
    app: obsidian-mcp
  ports:
    - port: 4000
      targetPort: 4000
