apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: obsidian-mcp
spec:
  parentRefs:
    - name: bretagne-gateway
      namespace: traefik
      sectionName: https-vault
  hostnames:
    - vault.bretagne.dev
  rules:
    - filters:
        # HSTS (S8). Conservative 1-day max-age for the initial rollout — reversible if a
        # cert breaks; raise to 31536000 (1y) after a validation window. No preload.
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: "max-age=86400; includeSubDomains"
      backendRefs:
        - name: obsidian-mcp
          port: 4000
