apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: obsidian-mcp
spec:
  parentRefs:
    - name: bretagne-gateway
      namespace: traefik
      sectionName: https-vault
  hostnames:
    - vault.bretagne.dev
  rules:
    - backendRefs:
        - name: obsidian-mcp
          port: 4000
