# AIOStreams canonical state lives in Postgres. /app/data is only a
# reconstructible cache (anime DB, SeaDex, temporary local files).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: aiostreams-pg
spec:
  instances: 1

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 384Mi

  monitoring:
    enablePodMonitor: true

  storage:
    size: 1Gi
    storageClass: local-path

  bootstrap:
    initdb:
      database: aiostreams
      owner: aiostreams

  backup:
    barmanObjectStore:
      destinationPath: s3://bretagne-pg-backups/aiostreams
      endpointURL: https://938f9d4cdcf888eddea773d0f68615bc.r2.cloudflarestorage.com
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-creds
          key: SECRET_ACCESS_KEY
      wal:
        compression: snappy
    retentionPolicy: "3d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: aiostreams-pg-daily
spec:
  # 6-field robfig cron (leading SECONDS), staggered after other app DB backups.
  schedule: "0 30 3 * * *"
  # Take a base backup as soon as this object is created, don't wait for the first
  # scheduled slot. Without it a fresh cluster has no backup until the next 03:30,
  # so cnpg_collector_last_available_backup_timestamp stays 0 and CNPGBackupTooOld
  # fires critical on every new DB. immediate only acts at creation time.
  immediate: true
  cluster:
    name: aiostreams-pg
  backupOwnerReference: self
