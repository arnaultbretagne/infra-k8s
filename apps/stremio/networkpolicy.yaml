# Default-deny + allow-list for the stremio namespace (ADR 0020 pattern).
# aiostreams keeps canonical state in CNPG/Postgres. /app/data is a rebuildable
# cache for anime-database / seadex / temporary files. It needs DNS, Postgres,
# and broad external HTTPS/HTTP egress to reach debrid services and indexers.
# Egress to `world` is intentionally broad here; tighten if ever scoped.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: aiostreams
  namespace: stremio
spec:
  endpointSelector:
    matchLabels:
      app: aiostreams
  ingress:
    # Traefik serves stremio.bretagne.dev -> app :3000 (public paths: manifest/streams/API)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports: [{ port: "3000", protocol: TCP }]
    # oauth2-proxy (same ns) -> app :3000 (the gated /stremio/configure path, ADR 0021)
    - fromEndpoints:
        - matchLabels:
            app: oauth2-proxy
      toPorts:
        - ports: [{ port: "3000", protocol: TCP }]
    # kubelet health probes -> app :3000
    - fromEntities: [host]
      toPorts:
        - ports: [{ port: "3000", protocol: TCP }]
  egress:
    # -> DNS (CoreDNS)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    # -> canonical AIOStreams database
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: aiostreams-pg
      toPorts:
        - ports: [{ port: "5432", protocol: TCP }]
    # -> external upstreams (debrid / indexers / database sync)
    - toEntities: [world]
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
            - { port: "80", protocol: TCP }
---
# AIOStreams Postgres: app ingress, CNPG operator management, metrics, S3 backup.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: aiostreams-pg
  namespace: stremio
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: aiostreams-pg
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: aiostreams
      toPorts:
        - ports: [{ port: "5432", protocol: TCP }]
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
            k8s:app.kubernetes.io/name: cloudnative-pg
      toPorts:
        - ports:
            - { port: "8000", protocol: TCP }
            - { port: "5432", protocol: TCP }
    - fromEndpoints:
        - matchLabels:
            cnpg.io/cluster: aiostreams-pg
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
            - { port: "8000", protocol: TCP }
    - fromEntities: [host]
      toPorts:
        - ports: [{ port: "8000", protocol: TCP }]
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports: [{ port: "9187", protocol: TCP }]
  egress:
    - toEntities: [kube-apiserver]
      toPorts:
        - ports: [{ port: "6443", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    - toEntities: [world]
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: aiostreams-pg
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
            - { port: "8000", protocol: TCP }
---
# OIDC gate for the /stremio/configure path (ADR 0021). Mirrors code-server's
# oauth2-proxy CNP: ingress only from Traefik; egress to DNS, the aiostreams
# upstream, and id.bretagne.dev (OIDC discovery/token — reached via the public
# IP -> node -> Traefik, so allow world/host:443 + the Traefik pod :8443).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: oauth2-proxy
  namespace: stremio
spec:
  endpointSelector:
    matchLabels:
      app: oauth2-proxy
  ingress:
    # Traefik serves the gated paths -> proxy :4180
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports: [{ port: "4180", protocol: TCP }]
    # kubelet probes
    - fromEntities: [host]
      toPorts:
        - ports: [{ port: "4180", protocol: TCP }]
  egress:
    # -> DNS (CoreDNS)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    # -> upstream aiostreams (authenticated /stremio/configure)
    - toEndpoints:
        - matchLabels:
            app: aiostreams
      toPorts:
        - ports: [{ port: "3000", protocol: TCP }]
    # -> id.bretagne.dev (OIDC discovery/token) via public IP -> node -> Traefik
    - toEntities: [world, host]
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports: [{ port: "8443", protocol: TCP }]
