# OIDC gate for stremio (ADR 0021), PATH-BASED (not whole-app): only
# /stremio/configure and the proxy's own /oidc/* are routed here (see httproute.yaml);
# the manifest/stream/API paths bypass this proxy and stay PUBLIC, because Stremio
# clients can't do OIDC — gating them would break every installed addon.
# UPSTREAMS points back at aiostreams: an authenticated /stremio/configure request is
# proxied through to the app. ALLOWED_GROUPS=admin,stremio (checked here AND client-side:
# the Pocket-ID `stremio` client is group-restricted to the same groups).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --http-address=0.0.0.0:4180
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: OAUTH2_PROXY_PROVIDER
              value: oidc
            - name: OAUTH2_PROXY_OIDC_ISSUER_URL
              value: https://id.bretagne.dev
            - name: OAUTH2_PROXY_REDIRECT_URL
              value: https://stremio.bretagne.dev/oidc/callback
            - name: OAUTH2_PROXY_PROXY_PREFIX
              value: /oidc
            - name: OAUTH2_PROXY_UPSTREAMS
              value: http://aiostreams.stremio.svc.cluster.local:3000
            - name: OAUTH2_PROXY_SCOPE
              value: openid email profile groups
            - name: OAUTH2_PROXY_OIDC_GROUPS_CLAIM
              value: groups
            - name: OAUTH2_PROXY_ALLOWED_GROUPS
              value: admin,stremio
            - name: OAUTH2_PROXY_EMAIL_DOMAINS
              value: '*'
            - name: OAUTH2_PROXY_COOKIE_SECURE
              value: "true"
            - name: OAUTH2_PROXY_COOKIE_DOMAINS
              value: stremio.bretagne.dev
            - name: OAUTH2_PROXY_WHITELIST_DOMAINS
              value: stremio.bretagne.dev
            - name: OAUTH2_PROXY_REVERSE_PROXY
              value: "true"
            - name: OAUTH2_PROXY_SKIP_PROVIDER_BUTTON
              value: "true"
            # Pocket-ID does not emit email_verified (known upstream gap, ADR 0021)
            - name: OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL
              value: "true"
          envFrom:
            - secretRef:
                name: oauth2-proxy
          ports:
            - containerPort: 4180
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
