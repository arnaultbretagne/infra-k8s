apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiostreams
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO PVC: don't run two pods against the same volume
  selector:
    matchLabels:
      app: aiostreams
  template:
    metadata:
      labels:
        app: aiostreams
    spec:
      securityContext:
        # The image is built to run as root; it works fine non-root as long as the
        # only writable paths are the PVC (/app/data, made group-writable by fsGroup)
        # and an emptyDir /tmp. Verified 2026-07-03 by booting a hardened test pod:
        # clean startup, DB initialised, port bound, no EACCES.
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aiostreams
          image: viren070/aiostreams:v2.26.0
          ports:
            - containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            # HOME must be writable under readOnlyRootFilesystem (image default /root
            # is now read-only); point it at the tmpfs.
            - name: HOME
              value: /tmp
            # The one-time initial sync (Fribb 42k entries + Manami + seadex)
            # loads everything into the V8 heap. Node auto-sizes old-space from
            # the cgroup limit, so give it an explicit ceiling with headroom.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
            - name: BASE_URL
              value: https://stremio.bretagne.dev
            - name: SEL_SYNC_ACCESS
              value: all
            - name: REGEX_FILTER_ACCESS
              value: all
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aiostreams-secrets
                  key: SECRET_KEY
            - name: AIOSTREAMS_AUTH
              valueFrom:
                secretKeyRef:
                  name: aiostreams-secrets
                  key: AIOSTREAMS_AUTH
          resources:
            requests:
              cpu: 50m
              memory: 128Mi          # steady-state is small; the spike is one-time sync
            limits:
              memory: 1Gi            # must cover the initial full-sync heap peak
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 20
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aiostreams-data
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
