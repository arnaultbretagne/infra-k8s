apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiostreams
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: aiostreams
  template:
    metadata:
      labels:
        app: aiostreams
    spec:
      securityContext:
        # fsGroup makes the cache emptyDir (/app/data) and tmp emptyDir writable by
        # uid/gid 1000 while the canonical state lives in CNPG/Postgres.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aiostreams
          image: viren070/aiostreams:v2.26.0
          ports:
            - containerPort: 3000
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            # HOME must be writable under readOnlyRootFilesystem (image default /root
            # is now read-only); point it at the tmpfs.
            - name: HOME
              value: /tmp
            # The one-time initial sync (Fribb 42k entries + Manami + seadex)
            # loads everything into the V8 heap. Node auto-sizes old-space from
            # the cgroup limit, so give it an explicit ceiling with headroom.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
            - name: BASE_URL
              value: https://stremio.bretagne.dev
            - name: DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: aiostreams-pg-app
                  key: uri
            - name: SEL_SYNC_ACCESS
              value: all
            - name: REGEX_FILTER_ACCESS
              value: all
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aiostreams-secrets
                  key: SECRET_KEY
            - name: AIOSTREAMS_AUTH
              valueFrom:
                secretKeyRef:
                  name: aiostreams-secrets
                  key: AIOSTREAMS_AUTH
          resources:
            requests:
              cpu: 50m
              memory: 128Mi          # steady-state is small; the spike is one-time sync
            limits:
              memory: 1Gi            # must cover the initial full-sync heap peak
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 20
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 2Gi
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
