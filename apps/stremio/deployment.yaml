apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiostreams
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO PVC: don't run two pods against the same volume
  selector:
    matchLabels:
      app: aiostreams
  template:
    metadata:
      labels:
        app: aiostreams
    spec:
      securityContext:
        # fsGroup makes emptyDir volumes (/tmp) writable by gid 1000. It does NOT apply
        # to the local-path PVC: those PVs are hostPath-backed and kubelet skips fsGroup
        # on hostPath, so the PVC ownership is fixed by the fix-perms initContainer below.
        # (runAsNonRoot/runAsUser live on the app container, not here, so the root init
        # container is allowed under this ns's PSS 'baseline'.)
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # local-path creates a fresh PVC dir owned root:shared(1001); the non-root app
        # (uid 1000) can't write it. chown it on every start (idempotent) so a rebuild on
        # an empty volume just works — no manual host chown. Reuses the CNPG image already
        # present in this ns (has chown, runs as root); no dedicated image.
        - name: fix-perms
          image: ghcr.io/cloudnative-pg/postgresql:17
          command: ["chown", "-R", "1000:1000", "/app/data"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
              add: [CHOWN, DAC_OVERRIDE, FOWNER]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 64Mi }
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: aiostreams
          image: viren070/aiostreams:v2.26.0
          ports:
            - containerPort: 3000
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            # HOME must be writable under readOnlyRootFilesystem (image default /root
            # is now read-only); point it at the tmpfs.
            - name: HOME
              value: /tmp
            # The one-time initial sync (Fribb 42k entries + Manami + seadex)
            # loads everything into the V8 heap. Node auto-sizes old-space from
            # the cgroup limit, so give it an explicit ceiling with headroom.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
            - name: BASE_URL
              value: https://stremio.bretagne.dev
            - name: SEL_SYNC_ACCESS
              value: all
            - name: REGEX_FILTER_ACCESS
              value: all
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aiostreams-secrets
                  key: SECRET_KEY
            - name: AIOSTREAMS_AUTH
              valueFrom:
                secretKeyRef:
                  name: aiostreams-secrets
                  key: AIOSTREAMS_AUTH
          resources:
            requests:
              cpu: 50m
              memory: 128Mi          # steady-state is small; the spike is one-time sync
            limits:
              memory: 1Gi            # must cover the initial full-sync heap peak
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 20
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aiostreams-data
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
