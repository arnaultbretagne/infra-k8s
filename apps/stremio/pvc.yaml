apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aiostreams-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      # Old volume was ~89M (db.sqlite 7.5M + synced anime-database/seadex).
      # 2Gi leaves headroom for the synced databases to grow.
      storage: 2Gi
