apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pocket-id-pg
spec:
  instances: 1

  # Survive node memory pressure (S5) — the IdP DB. Also bound it (was unbounded:
  # a runaway PG could contribute to a node OOM). It idles ~142Mi.
  priorityClassName: bretagne-critical
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Prometheus scrapes the instance (:9187) via the operator-managed PodMonitor —
  # feeds the CNPG backup/WAL-archiving alerts (observability/rules.yaml).
  monitoring:
    enablePodMonitor: true

  storage:
    size: 1Gi
    storageClass: local-path

  bootstrap:
    initdb:
      database: pocketid
      owner: pocketid

  backup:
    barmanObjectStore:
      destinationPath: s3://bretagne-pg-backups/pocket-id
      endpointURL: https://938f9d4cdcf888eddea773d0f68615bc.r2.cloudflarestorage.com
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-creds
          key: SECRET_ACCESS_KEY
      wal:
        compression: snappy
    retentionPolicy: "3d"
