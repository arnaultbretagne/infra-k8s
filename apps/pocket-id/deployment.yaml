apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
spec:
  replicas: 1
  # pocket-id refuses to start if another instance is already running, so the default
  # RollingUpdate (old + new pod briefly coexist) deadlocks any rollout. Terminate the
  # old pod first. Single replica anyway → a rollout always has a short blip.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pocket-id
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      # Survive node memory pressure over aiostreams/previews (S5) — the IdP.
      priorityClassName: bretagne-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault    # required by PSS 'restricted' (was the only missing field)
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2.11.0
          ports:
            - containerPort: 1411
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: APP_URL
              value: https://id.bretagne.dev
            - name: APP_ENV
              value: production
            - name: TRUST_PROXY
              value: "true"
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: pocket-id-pg-app
                  key: uri
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secrets
                  key: ENCRYPTION_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /health
              port: 1411
            failureThreshold: 10
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 1411
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 1411
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
