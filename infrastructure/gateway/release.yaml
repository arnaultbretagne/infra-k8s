apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "34.5.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    crds: Skip   # CRDs managed centrally in infrastructure-crds, not by this chart
    remediation:
      retries: 3
  upgrade:
    crds: Skip   # CRDs managed centrally in infrastructure-crds, not by this chart
    remediation:
      retries: 3
  values:
    # Pure Gateway API — no traefik.io CRDs / IngressRoute for now
    providers:
      kubernetesGateway:
        enabled: true
      kubernetesCRD:
        enabled: false

    # We use our own Gateway (bretagne-gateway), so disable the chart's default one.
    # GatewayClass "traefik" is still created by the chart (gatewayClass.enabled default true).
    gateway:
      enabled: false

    # No Traefik OIDC plugin: ADR 0010 (sevensolutions/traefik-oidc-auth) was superseded by
    # ADR 0021 — that plugin is a traefik.io Middleware CRD, incompatible with our pure
    # Gateway API setup (kubernetesCRD: false). Auth is oauth2-proxy (ForwardAuth) per app.

    # Entrypoints
    ports:
      web:
        port: 8000        # container port (non-privileged): Traefik runs non-root, can't bind :80. Service maps 80→8000.
        exposedPort: 80
        protocol: TCP
      websecure:
        port: 8443        # container port (non-privileged). Service maps 443→8443. (Phase 7: hostPort 80/443 → 8000/8443.)
        exposedPort: 443
        protocol: TCP

    # TLS certificates are provisioned by cert-manager via Gateway certificateRefs
    # (ADR 0008 updated) — Traefik's built-in ACME does not serve Gateway API anyway.

    # FLIP (Phase 7): bind the host public IP :80/:443 via Service externalIPs.
    # This rides kube-proxy (kept — kubeProxyReplacement=false), so it does NOT
    # touch the eBPF eth0 datapath / SSH, unlike Cilium L2 announcement (cilium-lb,
    # still deferred). externalIPs DNAT (kube-proxy) -> Traefik pod :8000/:8443.
    service:
      type: NodePort
      externalIPs:
        - 85.17.246.41

    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

    # Logs
    logs:
      general:
        level: INFO
