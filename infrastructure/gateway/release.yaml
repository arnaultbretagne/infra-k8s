apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "34.5.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    crds: Skip   # CRDs managed centrally in infrastructure-crds, not by this chart
    remediation:
      retries: 3
  upgrade:
    crds: Skip   # CRDs managed centrally in infrastructure-crds, not by this chart
    remediation:
      retries: 3
  values:
    # Pure Gateway API — no traefik.io CRDs / IngressRoute for now
    providers:
      kubernetesGateway:
        enabled: true
      kubernetesCRD:
        enabled: false

    # We use our own Gateway (bretagne-gateway), so disable the chart's default one.
    # GatewayClass "traefik" is still created by the chart (gatewayClass.enabled default true).
    gateway:
      enabled: false

    # OIDC auth plugin (ADR 0010)
    experimental:
      plugins:
        traefik-oidc-auth:
          moduleName: github.com/sevensolutions/traefik-oidc-auth
          version: v0.18.0

    # Entrypoints
    ports:
      web:
        port: 8000        # container port (non-privileged): Traefik runs non-root, can't bind :80. Service maps 80→8000.
        exposedPort: 80
        protocol: TCP
      websecure:
        port: 8443        # container port (non-privileged). Service maps 443→8443. (Phase 7: hostPort 80/443 → 8000/8443.)
        exposedPort: 443
        protocol: TCP

    # TLS certificates are provisioned by cert-manager via Gateway certificateRefs
    # (ADR 0008 updated) — Traefik's built-in ACME does not serve Gateway API anyway.

    # NodePort during build (Phases 1–6): Cilium must NOT announce the public IP until the
    # flip (Phase 7), else the eBPF datapath seizes eth0 → SSH lockout. Validate out-of-band
    # (port-forward / localhost). Flip to LoadBalancer + re-add cilium-lb at Phase 7.
    service:
      type: NodePort

    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

    # Logs
    logs:
      general:
        level: INFO
