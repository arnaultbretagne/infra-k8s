apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
spec:
  parentRefs:
    - name: bretagne-gateway
      namespace: traefik
      sectionName: http        # attach ONLY to the :80 HTTP listener
  # No hostnames → matches every HTTP request. The "/" PathPrefix is the LEAST specific
  # match, so cert-manager's ACME solver HTTPRoute (exact /.well-known/acme-challenge/<token>
  # path) always wins Gateway API precedence during a challenge — HTTP-01 renewals keep
  # working while every other HTTP request gets a 301 to HTTPS.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
