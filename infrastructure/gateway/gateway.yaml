apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: bretagne-gateway
  namespace: traefik
  annotations:
    # cert-manager provisions the listener certs (ADR 0008 updated).
    # FLIP: prod issuer — HTTP-01 now resolves (Traefik owns :80, DNS already -> VPS).
    # cert-manager aggregates all listener hostnames sharing `bretagne-tls` into one
    # multi-SAN Certificate, validated per-host via HTTP-01.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 8443
      protocol: HTTPS
      hostname: id.bretagne.dev
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: bretagne-tls
      allowedRoutes:
        namespaces:
          from: All
    # Per-host listener for aiostreams. Shares bretagne-tls -> cert-manager adds
    # stremio.bretagne.dev as a SAN on the same multi-SAN cert. Add one block per app.
    - name: https-stremio
      port: 8443
      protocol: HTTPS
      hostname: stremio.bretagne.dev
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: bretagne-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-grafana
      port: 8443
      protocol: HTTPS
      hostname: grafana.bretagne.dev
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: bretagne-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-code
      port: 8443
      protocol: HTTPS
      hostname: code.bretagne.dev
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: bretagne-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-agent
      port: 8443
      protocol: HTTPS
      hostname: agent.bretagne.dev
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: bretagne-tls
      allowedRoutes:
        namespaces:
          from: All
