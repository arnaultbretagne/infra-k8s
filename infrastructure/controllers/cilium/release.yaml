apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.19.2"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # kube-proxy replacement (ADR 0006)
    kubeProxyReplacement: true
    k8sServiceHost: "localhost"
    k8sServicePort: "6443"

    # Pod CIDR (must match k0s.yaml)
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList:
          - 10.244.0.0/16

    # Hubble: disabled initially (enable with ADR 0014)
    hubble:
      enabled: false

    # Resources
    operator:
      replicas: 1          # single-node: avoid 2nd replica stuck Pending on hostPort conflict
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
