apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.19.2"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # kube-proxy KEPT (ADR 0006 amended 2026-06-28): kpr attaches eBPF to eth0 → host SSH lockout
    # on this single-NIC VPS (cilium #46010). Cilium stays for CNI + Hubble + NetworkPolicy.
    kubeProxyReplacement: false
    k8sServiceHost: "localhost"
    k8sServicePort: "6443"

    # L2 announcement feature: OFF until the flip (Phase 7). On a single public IP / single
    # NIC, announcing it mid-build makes Cilium's eBPF datapath seize eth0 → SSH lockout
    # (post-mortem 2026-06-28). Re-enable together with cilium-lb at Phase 7.
    l2announcements:
      enabled: false
    k8sClientRateLimit:
      qps: 50
      burst: 100

    # Pod CIDR (must match k0s.yaml)
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList:
          - 10.244.0.0/16

    # Hubble ON (ADR 0014/0020): flow observability ("the agent's eyes") + the audit basis
    # for NetworkPolicies. relay aggregates flows; UI deferred to the flip (needs ingress).
    hubble:
      enabled: true
      relay:
        enabled: true

    # Resources
    operator:
      replicas: 1          # single-node: avoid 2nd replica stuck Pending on hostPort conflict
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
