# ADR 0027 — the name is the contract ("sandboxed"), the handler is a property of the
# current substrate (runsc today; kata if the machine ever provides KVM).
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: sandboxed
handler: runsc
overhead:
  podFixed:
    memory: 64Mi
    cpu: 20m
