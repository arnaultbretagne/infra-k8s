# Scopes the manager's ServiceAccount (apps/agent/manager.yaml) to pod CRUD in THIS namespace only
# (agent-runtime ADR 0010 §7 / infra-k8s ADR 0028 §3). No exec, no secrets — pod-create authority
# is bounded by admission (ADR 0027 VAP, PSA restricted, this namespace's quota).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runtime-manager
  namespace: agent-runs
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runtime-manager
  namespace: agent-runs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runtime-manager
subjects:
  - kind: ServiceAccount
    name: runtime-manager
    namespace: agent
