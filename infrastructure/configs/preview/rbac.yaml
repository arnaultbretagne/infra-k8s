# The impersonation target (ADR 0017 v3 §1). Kind allowlist is deliberate: no Secrets,
# no NetworkPolicies, no PVCs (extended consciously at app onboarding, F2).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: preview-applier
  namespace: preview
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: preview-applier
  namespace: preview
rules:
  - apiGroups: ["", "apps"]
    resources: ["configmaps", "services", "deployments"]
    verbs: ["*"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: preview-applier
  namespace: preview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: preview-applier
subjects:
  - kind: ServiceAccount
    name: preview-applier
    namespace: preview
