# Metrics + alerting + dashboards (ADR 0014, amended: multi-chart, not k8s-monitoring —
# the "unified" chart turned out to be collectors-only, see the ADR amendment).
# CRDs are NOT installed here (crds.enabled=false) — they come from the
# prometheus-operator-crds HelmRelease in infrastructure-controllers, so that
# monitors/rules in this layer pass Flux's server-side dry-run validation.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.17.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    fullnameOverride: kps
    cleanPrometheusOperatorObjectNames: true

    # CRDs come from prometheus-operator-crds (infrastructure-controllers)
    crds:
      enabled: false

    # k0s single-node: control-plane components run as host processes (no
    # scrapable pods), the datastore is kine/SQLite (no etcd), and kube-proxy
    # binds its metrics to 127.0.0.1. Scraping/alerting on them = permanent
    # false positives.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    defaultRules:
      rules:
        etcd: false
        kubeControllerManager: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false
        kubeProxy: false

    # Single-node k0s/kine: nobody will ever do apiserver SLOs here. The chart's
    # default metricRelabelings only trims some bucket label values; this REPLACES
    # it (setting the key overrides the chart default) and drops the whole bucket
    # families (~27k series, 38% of the TSDB), keeping _count/_sum for trends.
    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            sourceLabels: [__name__]
            regex: (apiserver_request_duration_seconds|apiserver_request_body_size_bytes|apiserver_request_slo_duration_seconds|apiserver_request_sli_duration_seconds|apiserver_response_sizes|apiserver_watch_events_sizes|apiserver_watch_events_duration_seconds|etcd_request_duration_seconds)_bucket

    prometheusOperator:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi

    prometheus:
      prometheusSpec:
        # 30s scrape + 30d retention (ADR 0014). retentionSize keeps the TSDB
        # below the PVC size — local-path does NOT enforce PVC size (cf. the
        # 15GB WAL incident), so Prometheus must self-limit.
        scrapeInterval: 30s
        evaluationInterval: 30s
        retention: 30d
        retentionSize: 14GB
        externalLabels:
          cluster: bretagne
        # Scrape every ServiceMonitor/PodMonitor/PrometheusRule in the cluster,
        # not just the ones with the Helm release label (apps declare their own).
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 2Gi

    alertmanager:
      alertmanagerSpec:
        # Config from the SOPS secret alertmanager-config (key alertmanager.yaml):
        # real alerts -> email via Resend; the always-firing Watchdog -> healthchecks.io
        # as the external dead-man's switch (box/cluster death stops the ping -> alert).
        configSecret: alertmanager-config
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

    grafana:
      fullnameOverride: grafana
      defaultDashboardsTimezone: Europe/Paris
      admin:
        # Break-glass local admin; day-to-day login is OIDC via Pocket-ID.
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      envFromSecret: grafana-oidc   # GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      grafana.ini:
        server:
          root_url: https://grafana.bretagne.dev
        analytics:
          reporting_enabled: false
          check_for_updates: false
        dashboards:
          # "Est-ce que tout va bien, la, maintenant ?" (P3.3) — sidecar-delivered
          # (ConfigMap mechanism), hence /tmp/dashboards/... not /var/lib/grafana/...
          default_home_dashboard_path: /tmp/dashboards/Bretagne/bretagne-home.json
        auth.generic_oauth:
          enabled: true
          name: Pocket-ID
          client_id: 4f0dcb8c-2f26-4a3f-a3e1-e42fb8c2a7a1
          scopes: openid profile email groups
          auth_url: https://id.bretagne.dev/authorize
          token_url: https://id.bretagne.dev/api/oidc/token
          api_url: https://id.bretagne.dev/api/oidc/userinfo
          use_pkce: true
          use_refresh_token: true
          allow_sign_up: true
          # Skip the Grafana login page, go straight to Pocket-ID.
          # Break-glass local admin: /login?disableAutoLogin=true
          auto_login: true
          # Pocket-ID `admin` group -> full Grafana admin; any other Pocket-ID
          # account gets read-only Viewer.
          role_attribute_path: contains(groups[*], 'admin') && 'GrafanaAdmin' || 'Viewer'
          allow_assign_grafana_admin: true
      additionalDataSources:
        - name: Loki
          uid: loki
          type: loki
          access: proxy
          url: http://loki.observability.svc.cluster.local:3100
      # Route sidecar-loaded ConfigMap dashboards into folders by annotation
      # (Cilium/Hubble charts, Flux JSONs in P3). Un-annotated ConfigMaps (the 24
      # kps mixins) keep landing at the provider root -> folder "General".
      sidecar:
        dashboards:
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: true
      # Human-friendly community dashboards (folder "Bretagne"), downloaded by
      # the init container from grafana.com at pod start, pinned by revision.
      # The kube-prometheus-stack mixin dashboards (folder General) stay as the
      # exhaustive/debugging set; these are the daily-driver views.
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: bretagne
              orgId: 1
              folder: Bretagne
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/bretagne
      dashboards:
        bretagne:
          node-exporter-full:      # the Beszel replacement: everything about the host
            gnetId: 1860
            revision: 45
            datasource: Prometheus
          k8s-views-global:        # cluster at a glance (dotdc); home dashboard is now Bretagne Home
            gnetId: 15757
            revision: 43
            datasource: Prometheus
          k8s-views-namespaces:
            gnetId: 15758
            revision: 46
            datasource: Prometheus
          k8s-views-pods:
            gnetId: 15760
            revision: 39
            datasource: Prometheus
          cloudnativepg:           # pocket-id-pg health incl. WAL/backup state
            gnetId: 20417
            revision: 4
            datasource: Prometheus
          traefik-official:        # edge RED baseline; custom-adapted version comes in P3
            gnetId: 17347
            revision: 9
            datasource: Prometheus
          prometheus-meta:         # meta-monitoring: is Prometheus itself healthy/keeping up
            gnetId: 19105
            revision: 9
            datasource: Prometheus
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 384Mi
      testFramework:
        enabled: false

    prometheus-node-exporter:
      fullnameOverride: node-exporter
      # No hostNetwork: the host nftables policy (input drop, 22/80/443 only)
      # silently drops pod->hostIP:9100 scrapes. Pod-network + hostPath mounts
      # (/proc, /sys, /) give identical node metrics without opening the host.
      hostNetwork: false
      hostPID: true
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 64Mi

    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      # Flux GitOps state (flux2-monitoring-example, pruned to CRDs actually
      # installed here — no image-reflector/automation controllers, so the
      # Image* kinds are dropped). Copied ONLY rbac.extraRules +
      # customResourceState: the upstream example's `collectors: []` +
      # `--custom-resource-state-only=true` would disable ALL standard kube_*
      # collectors (kube_job_failed, kube_deployment_status_replicas_available…)
      # — verified against installed CRDs and served API versions 2026-07-05.
      rbac:
        extraRules:
          - apiGroups:
              - source.toolkit.fluxcd.io
              - kustomize.toolkit.fluxcd.io
              - helm.toolkit.fluxcd.io
              - notification.toolkit.fluxcd.io
            resources:
              - gitrepositories
              - buckets
              - helmrepositories
              - helmcharts
              - ocirepositories
              - kustomizations
              - helmreleases
              - alerts
              - providers
              - receivers
            verbs: ["list", "watch"]
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              - groupVersionKind:
                  group: kustomize.toolkit.fluxcd.io
                  version: v1
                  kind: Kustomization
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Kustomization resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, lastAppliedRevision]
                      source_name: [spec, sourceRef, name]
              - groupVersionKind:
                  group: helm.toolkit.fluxcd.io
                  version: v2
                  kind: HelmRelease
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmRelease resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, history, "0", chartVersion]
                      chart_name: [status, history, "0", chartName]
                      chart_app_version: [status, history, "0", appVersion]
                      chart_ref_name: [spec, chartRef, name]
                      chart_source_name: [spec, chart, spec, sourceRef, name]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: GitRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux GitRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: Bucket
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Bucket resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      endpoint: [spec, endpoint]
                      bucket_name: [spec, bucketName]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmChart
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmChart resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      chart_name: [spec, chart]
                      chart_version: [spec, version]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: OCIRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux OCIRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: notification.toolkit.fluxcd.io
                  version: v1beta3
                  kind: Alert
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Alert resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      suspended: [spec, suspend]
              - groupVersionKind:
                  group: notification.toolkit.fluxcd.io
                  version: v1beta3
                  kind: Provider
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Provider resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      suspended: [spec, suspend]
              - groupVersionKind:
                  group: notification.toolkit.fluxcd.io
                  version: v1
                  kind: Receiver
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Receiver resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      webhook_path: [status, webhookPath]
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
