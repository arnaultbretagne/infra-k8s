# Grafana is the only observability component exposed to the internet.
# Auth = Grafana's native OIDC against Pocket-ID (not oauth2-proxy: Grafana
# needs the user identity for role mapping, a plain auth gate wouldn't carry it).
# Prometheus / Alertmanager / Loki stay cluster-internal, queried through Grafana.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
spec:
  parentRefs:
    - name: bretagne-gateway
      namespace: traefik
      sectionName: https-grafana
  hostnames:
    - grafana.bretagne.dev
  rules:
    - filters:
        # HSTS (S8). Conservative 1-day max-age for the initial rollout — reversible if a
        # cert breaks; raise to 31536000 (1y) after a validation window. No preload.
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: "max-age=86400; includeSubDomains"
      backendRefs:
        - name: grafana
          port: 80
