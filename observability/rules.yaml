# The P0 alerts this cluster went blind without (infra-migration-review §3.2):
# CNPG backup health, host disk, cert expiry. Job/CronJob failures (e.g. the
# pocket-id restore-test) are already covered by kube-prometheus-stack's
# default KubeJobFailed rule.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bretagne-critical
  namespace: observability
spec:
  groups:
    - name: cnpg-backup
      rules:
        - alert: CNPGWALArchivingStalled
          # value="ready" counts WAL segments waiting to be archived to S3.
          # Healthy steady-state is ~0; a sustained backlog means archiving is
          # failing or can't keep up (verified live: 373 ready during the
          # 2026-06-28 archiving incident).
          expr: cnpg_collector_pg_wal_archive_status{value="ready"} > 20
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: 'CNPG {{ $labels.namespace }}/{{ $labels.pod }}: WAL archiving backlog ({{ $value }} segments)'
            description: 'WAL segments are piling up on the PVC (local-path does not enforce size limits) and point-in-time recovery is broken.'
        - alert: CNPGBackupTooOld
          # last_available_backup_timestamp == 0 means no successful backup at
          # all since instance start — time()-0 is huge, so this also fires.
          # Base backups are now DAILY (ScheduledBackup 03:00, was hourly) → age
          # grows to ~24h between runs; only alert if a daily backup was actually
          # missed. 93600s = 26h (24h + 2h grace).
          expr: time() - cnpg_collector_last_available_backup_timestamp > 93600
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: 'CNPG {{ $labels.namespace }}/{{ $labels.pod }}: no successful backup for >26h'
            description: 'A daily base backup was missed; the S3 restore chain is stale. The "rebuild from S3" promise does not hold right now.'
        - alert: CNPGRestoreDrillFailed
          # The daily restore-test CronJob (apps/pocket-id/restore-test.yaml) actually
          # restores the latest S3 backup into a throwaway pod and runs a health query.
          # kube-prometheus-stack's default KubeJobFailed already catches this — but only
          # as a generic warning lost among all job failures. This elevates the restore
          # drill specifically to critical: a failed drill means the backup is NOT
          # restorable, which is a DR emergency, not a routine job blip. Same metric as
          # KubeJobFailed (kube_job_failed) so behaviour is consistent.
          expr: kube_job_failed{job="kube-state-metrics", job_name=~".*-pg-restore-test.*"} > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: 'Backup restore drill FAILED ({{ $labels.namespace }}/{{ $labels.job_name }})'
            description: 'The daily restore of the pocket-id S3 backup did not pass its health query. Treat the backup as NOT restorable until verified by hand — disaster recovery is broken.'
    - name: host
      rules:
        - alert: HostRootDiskUsageHigh
          expr: (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) > 0.80
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: 'Root filesystem above 80% on {{ $labels.instance }}'
            description: 'PVCs (local-path), the container runtime and kine all share /. Disk pressure evicts pods at random.'
    - name: certificates
      rules:
        - alert: CertificateExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 86400
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 14 days'
            description: 'cert-manager should renew at 30 days before expiry — if this fires, renewal is broken (ACME/HTTP-01 path).'
