# The P0 alerts this cluster went blind without (infra-migration-review §3.2):
# CNPG backup health, host disk, cert expiry. Job/CronJob failures (e.g. the
# pocket-id restore-test) are already covered by kube-prometheus-stack's
# default KubeJobFailed rule.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bretagne-critical
  namespace: observability
spec:
  groups:
    - name: cnpg-backup
      rules:
        - alert: CNPGWALArchivingStalled
          # value="ready" counts WAL segments waiting to be archived to S3.
          # Healthy steady-state is ~0; a sustained backlog means archiving is
          # failing or can't keep up (verified live: 373 ready during the
          # 2026-06-28 archiving incident).
          expr: cnpg_collector_pg_wal_archive_status{value="ready"} > 20
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: 'CNPG {{ $labels.namespace }}/{{ $labels.pod }}: WAL archiving backlog ({{ $value }} segments)'
            description: 'WAL segments are piling up on the PVC (local-path does not enforce size limits) and point-in-time recovery is broken.'
        - alert: CNPGBackupTooOld
          # last_available_backup_timestamp == 0 means no successful backup at
          # all since instance start — time()-0 is huge, so this also fires.
          # Base backups are now DAILY (ScheduledBackup 03:00, was hourly) → age
          # grows to ~24h between runs; only alert if a daily backup was actually
          # missed. 93600s = 26h (24h + 2h grace).
          expr: time() - cnpg_collector_last_available_backup_timestamp > 93600
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: 'CNPG {{ $labels.namespace }}/{{ $labels.pod }}: no successful backup for >26h'
            description: 'A daily base backup was missed; the S3 restore chain is stale. The "rebuild from S3" promise does not hold right now.'
        - alert: CNPGRestoreDrillFailed
          # The daily restore-test CronJob (apps/pocket-id/restore-test.yaml) actually
          # restores the latest S3 backup into a throwaway pod and runs a health query.
          # kube-prometheus-stack's default KubeJobFailed already catches this — but only
          # as a generic warning lost among all job failures. This elevates the restore
          # drill specifically to critical: a failed drill means the backup is NOT
          # restorable, which is a DR emergency, not a routine job blip. Same metric as
          # KubeJobFailed (kube_job_failed) so behaviour is consistent.
          expr: kube_job_failed{job="kube-state-metrics", job_name=~".*-pg-restore-test.*"} > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: 'Backup restore drill FAILED ({{ $labels.namespace }}/{{ $labels.job_name }})'
            description: 'The daily restore of the pocket-id S3 backup did not pass its health query. Treat the backup as NOT restorable until verified by hand — disaster recovery is broken.'
    - name: host
      rules:
        - alert: HostRootDiskUsageHigh
          expr: (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) > 0.80
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: 'Root filesystem above 80% on {{ $labels.instance }}'
            description: 'PVCs (local-path), the container runtime and kine all share /. Disk pressure evicts pods at random.'
    - name: certificates
      rules:
        - alert: CertificateExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 86400
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 14 days'
            description: 'cert-manager should renew at 30 days before expiry — if this fires, renewal is broken (ACME/HTTP-01 path).'
---
# Edge RED (ADR 0014's promised custom rules, part 1): low-cardinality series for
# 30d trends + the missing symptom alerts (error ratio / latency at the edge).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bretagne-edge
  namespace: observability
spec:
  groups:
    - name: traefik-recording
      rules:
        - record: traefik:requests:rate5m
          expr: sum by (service) (rate(traefik_service_requests_total[5m]))
        - record: traefik:errors5xx:ratio_rate5m
          expr: |
            sum by (service) (rate(traefik_service_requests_total{code=~"5.."}[5m]))
              /
            sum by (service) (rate(traefik_service_requests_total[5m]))
        - record: traefik:request_duration:p95_5m
          expr: histogram_quantile(0.95, sum by (service, le) (rate(traefik_service_request_duration_seconds_bucket[5m])))
    - name: traefik-symptoms
      rules:
        - alert: EdgeService5xxRatioHigh
          # Symptom alert (users are seeing errors). The rate() floor avoids firing
          # on a single failed request against near-zero traffic.
          expr: traefik:errors5xx:ratio_rate5m > 0.05 and traefik:requests:rate5m > 0.1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: 'Edge 5xx ratio >5% on {{ $labels.service }}'
            description: 'More than 5% of requests through Traefik fail for this service — users are impacted right now.'
        - alert: EdgeServiceLatencyP95High
          expr: traefik:request_duration:p95_5m > 1 and traefik:requests:rate5m > 0.1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: 'Edge p95 latency >1s on {{ $labels.service }}'
            description: 'p95 served by Traefik exceeds 1s sustained — degraded experience, look at the app then the node (USE).'
    - name: network-symptoms
      rules:
        - alert: NetworkPolicyDrops
          # ADR 0020 continuous audit: sustained policy drops = either a guardrail
          # biting a legit flow (regression) or something probing where it shouldn't.
          # No `by (source, destination)` here (unlike the original proposal): both
          # use sourceContext/destinationContext=identity (P2.2), which renders as the
          # full k8s label set of the pod — verified live (2026-07-05 functional test)
          # to include job-run/version labels that churn, i.e. unbounded cardinality
          # over time. A single cluster-wide signal is the safe/stable choice; use
          # `hubble observe --verdict DROPPED` for the actual source/destination.
          expr: sum(rate(hubble_drop_total{reason="POLICY_DENIED"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: 'NetworkPolicy drops sustained for 10+ min'
            description: 'Cilium is dropping packets on policy for 10+ min. Check `hubble observe --verdict DROPPED` and compare against ADR 0020 guardrails.'
    - name: cluster-trends
      rules:
        - record: cluster:cpu:utilisation:ratio_rate5m
          expr: 1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))
        - record: cluster:memory:working_set:bytes
          expr: node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes
        - record: host:root_disk:used:ratio
          expr: 1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}
    - name: meta-monitoring
      rules:
        - alert: PrometheusHeadSeriesHigh
          # Anti-cardinality-explosion guardrail (budget gauge: ~45k expected post-P1).
          expr: prometheus_tsdb_head_series > 120000
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: 'Prometheus head series at {{ $value }} (>120k)'
            description: 'Something started emitting high-cardinality metrics. Check scrape_series_added by job and the recent changes.'
    - name: synthetic
      rules:
        - alert: PublicEndpointDown
          expr: probe_success == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: '{{ $labels.instance }} unreachable from synthetic probe'
            description: 'The full external chain (DNS/TLS/Traefik/app) fails as a client would see it.'
