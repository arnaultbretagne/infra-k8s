apiVersion: k0s.k0sproject.io/v1beta1
kind: ClusterConfig
metadata:
  name: k0s
spec:
  api:
    address: __PUBLIC_IP__
    port: 6443
    sans:
      - __PUBLIC_IP__
    extraArgs:
      encryption-provider-config: /var/lib/k0s/pki/encryptionconfig.yaml
  network:
    provider: custom
    podCIDR: 10.244.0.0/16
    serviceCIDR: 10.96.0.0/12
    # kube-proxy KEPT (ADR 0006 amended 2026-06-28): Cilium kube-proxy-replacement attaches eBPF
    # to eth0 → killed host SSH on this single-NIC VPS (cilium #46010). kube-proxy never touches eth0.
    kubeProxy:
      disabled: false
  storage:
    type: kine
  telemetry:
    enabled: false
