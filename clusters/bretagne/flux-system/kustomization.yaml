apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml
patches:
  # Flux default NetworkPolicies block kubelet probes when Cilium enforces
  # policies (host traffic doesn't match podSelector). Remove them — network
  # isolation is handled at the namespace level via Cilium policies if needed.
  - target:
      kind: NetworkPolicy
      namespace: flux-system
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: unused
  # PSS: enforce 'restricted' on flux-system (S4). Verified 2026-07-02 — no existing
  # Flux controller pod violates restricted (server dry-run was clean). Applied at
  # bootstrap (this dir isn't in the continuous reconcile path); the ingress CNP that
  # complements it lives in infrastructure/configs/flux-hardening (self-healing).
  - target:
      kind: Namespace
      name: flux-system
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: flux-system
        labels:
          platform.bretagne.dev/profile: infra   # ADR 0024 — GitOps control plane
          pod-security.kubernetes.io/enforce: restricted
          pod-security.kubernetes.io/enforce-version: latest
