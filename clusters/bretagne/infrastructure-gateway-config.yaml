apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-gateway-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: infrastructure-gateway
  path: ./infrastructure/gateway/middlewares
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
