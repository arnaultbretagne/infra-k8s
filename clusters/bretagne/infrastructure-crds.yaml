apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-crds
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: infrastructure-sources
  path: ./config/crd
  prune: false
  sourceRef:
    kind: GitRepository
    name: gateway-api
  wait: true
